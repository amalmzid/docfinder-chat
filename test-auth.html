<!DOCTYPE html>
<html>
<head>
    <title>Test Authentication</title>
</head>
<body>
    <h1>Authentication Test</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        // Check localStorage
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        const userType = localStorage.getItem('userType');
        
        results.innerHTML = `
            <h2>localStorage contents:</h2>
            <p><strong>Token:</strong> ${token || 'Not found'}</p>
            <p><strong>User ID:</strong> ${userId || 'Not found'}</p>
            <p><strong>User Type:</strong> ${userType || 'Not found'}</p>
            
            <h2>Authentication Status:</h2>
            <p><strong>Has Token:</strong> ${!!token}</p>
            <p><strong>Has User ID:</strong> ${!!userId}</p>
            <p><strong>Has User Type:</strong> ${!!userType}</p>
            <p><strong>Is Patient:</strong> ${userType === 'patient'}</p>
        `;
        
        // Test API call
        if (token && userId && userType === 'patient') {
            fetch('http://localhost/heal-u/backend/api/doctors')
                .then(response => response.json())
                .then(data => {
                    results.innerHTML += `<h2>API Test:</h2><p>Doctors API works: ${Array.isArray(data) ? 'Yes' : 'No'}</p>`;
                })
                .catch(error => {
                    results.innerHTML += `<h2>API Test:</h2><p>Error: ${error.message}</p>`;
                });
        }
    </script>
</body>
</html>
